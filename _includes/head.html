<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1"> {%- seo -%}
    <link rel="stylesheet" href="{{ " /assets/main.css " | relative_url }}"> {%- feed_meta -%} {%- if jekyll.environment == 'production' and site.google_analytics -%} {%- include google-analytics.html -%} {%- endif -%}

    <link rel="manifest" href="/manifest.json">
    <script>
        if ("serviceWorker" in navigator) {
            if (navigator.serviceWorker.controller) {
                console.log("An active service worker found, no need to register");
            } else {
                navigator.serviceWorker
                    .register("{{ site.baseurl }}/service-worker.js", {
                        scope: "./"
                    })
                    .then(function(reg) {
                        console.log("Service worker has been registered for scope: " + reg.scope);
                    });
            }
        }
    </script>
</head>
